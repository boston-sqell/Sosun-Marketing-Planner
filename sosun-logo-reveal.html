<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sosun — Logo Reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #050c08; }

body {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Nunito', sans-serif;
}

/* ── Full-screen canvas: rings + particles + neural net ── */
#bgCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  display: block;
  pointer-events: all;
}

/* ── Scene over canvas — passes mouse events through ── */
#scene {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
}

/* ── Logo host ── */
#logoWrapper {
  position: relative;
  opacity: 0;
  transition: opacity 0.16s ease;
}

/* Text container — letter-spacing applied here, spans inherit */
#logoTextWrap {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: clamp(72px, 8.5vw, 104px);
  letter-spacing: -4px;
  line-height: 1.05;
  white-space: nowrap;
  display: block;
  user-select: none;
}

/* Per-character span — width locked after measurement to prevent layout jitter */
.char {
  display: inline-block;
  text-align: center;
  color: rgba(34, 197, 94, 0.14);
  text-shadow: none;
  transition: filter 0.08s ease;
  will-change: color, text-shadow, transform;
}

/* Fully resolved character: neon glow + 3-D depth extrusion */
.char.locked {
  color: #22c55e;
  text-shadow:
    /* Neon aura */
    0 0  10px rgba(34,197,94,0.95),
    0 0  24px rgba(34,197,94,0.65),
    0 0  52px rgba(34,197,94,0.28),
    0 0 100px rgba(34,197,94,0.12),
    /* 3-D extrusion — dark green depth */
    1px  2px  0 rgba( 8, 60, 24, 0.95),
    2px  4px  0 rgba( 7, 52, 20, 0.90),
    3px  6px  0 rgba( 6, 44, 17, 0.85),
    4px  8px  0 rgba( 5, 36, 14, 0.80),
    5px 10px  0 rgba( 4, 28, 10, 0.75),
    6px 12px  0 rgba( 3, 20,  7, 0.70),
    7px 14px  0 rgba( 2, 14,  5, 0.65),
    8px 16px 18px rgba(0,   0,  0, 0.60);
}

/* Scan-line: a luminous bar that sweeps left→right during flicker */
#scanLine {
  position: absolute;
  top: -12px;
  bottom: -12px;
  width: 3px;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(34,197,94,0.18) 28%,
    rgba(34,197,94,0.70) 50%,
    rgba(34,197,94,0.18) 72%,
    transparent 100%
  );
  box-shadow: 0 0 18px 6px rgba(34,197,94,0.16);
  left: 0;
  opacity: 0;
  pointer-events: none;
  will-change: left, opacity;
}

/* ── Brand text ── */
#subtitle {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 6.5px;
  text-transform: uppercase;
  color: rgba(134, 194, 150, 0.80);
  margin-top: 10px;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.95s ease, transform 0.95s ease;
}

#tagline {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  text-align: center;
  color: rgba(100, 150, 110, 0.48);
  line-height: 2.6;
  margin-top: 20px;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.95s ease, transform 0.95s ease;
}

/* ── Replay ── */
#replayBtn {
  position: fixed;
  bottom: 22px; right: 26px;
  font-family: 'Nunito', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(34,197,94,0.30);
  cursor: pointer; user-select: none;
  opacity: 0; transition: color 0.3s, opacity 0.7s;
  z-index: 10; pointer-events: all;
}
#replayBtn:hover { color: rgba(34,197,94,0.88); }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="scene">
  <div id="logoWrapper">
    <div id="logoTextWrap"><!-- character spans injected by JS --></div>
    <div id="scanLine"></div>
  </div>
  <div id="subtitle">Fihaara</div>
  <div id="tagline">Rooted in Trust<br>Grown for Tomorrow</div>
</div>

<div id="replayBtn" onclick="startReveal()">↺ &nbsp;Replay</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CANVAS — exact Login.tsx rings + particles + neural-net layer
═══════════════════════════════════════════════════════════════ */
const bgCanvas = (() => {
  const canvas = document.getElementById('bgCanvas');
  const ctx    = canvas.getContext('2d');
  const G      = '34,197,94'; // app green

  /* Ring definitions: exact from Login.tsx */
  const RING_DEFS = [
    { f:0.18, ar:0.58, dash: 6, gap: 5, spd: 0.22,  ph:0.0, a:0.62 },
    { f:0.30, ar:0.58, dash: 8, gap: 7, spd:-0.17,  ph:1.1, a:0.54 },
    { f:0.42, ar:0.58, dash:10, gap: 9, spd: 0.13,  ph:2.2, a:0.46 },
    { f:0.55, ar:0.58, dash:12, gap:11, spd:-0.09,  ph:3.3, a:0.36 },
    { f:0.68, ar:0.58, dash:14, gap:13, spd: 0.06,  ph:4.4, a:0.26 },
    { f:0.82, ar:0.58, dash:16, gap:15, spd:-0.04,  ph:5.5, a:0.17 },
    { f:0.97, ar:0.58, dash:18, gap:17, spd: 0.025, ph:6.6, a:0.09 },
  ];

  let W, H;
  const resize = () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; };
  resize(); window.addEventListener('resize', resize);

  /* Mouse */
  const mouse = { x: -9999, y: -9999, active: false };
  canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; });
  canvas.addEventListener('mouseleave', () => { mouse.active = false; });

  /* Login.tsx particle constants */
  const PARTICLE_N = 110, MAX_LINK = 150;
  const REPEL_R = 120, REPEL_F = 3.5, EASE = 0.04, CURSOR_LINK = 180;

  const dots = Array.from({ length: PARTICLE_N }, () => {
    const bvx = (Math.random()-0.5)*0.56, bvy = (Math.random()-0.5)*0.56;
    return { x:Math.random()*innerWidth, y:Math.random()*innerHeight, vx:bvx, vy:bvy, bvx, bvy, r:Math.random()*1.2+0.4 };
  });

  /* ── Hub nodes: larger glowing nodes orbiting the logo ── */
  const HUB_N = 11;
  const hubs = Array.from({ length: HUB_N }, (_, i) => ({
    angle  : (i / HUB_N) * Math.PI * 2,
    radius : 95 + Math.random() * 145,
    speed  : (0.05 + Math.random() * 0.15) * (Math.random() < 0.5 ? 1 : -1),
    r      : 1.5 + Math.random() * 1.9,
    phase  : Math.random() * Math.PI * 2,
  }));

  /* Orbit centre tracks logo position — updated once after layout */
  let ocx = innerWidth/2, ocy = innerHeight/2;

  /* Network connections: node↔node and node→logo-anchor */
  let conns      = [];
  let anchors    = [];   // logo anchor points (page coords = canvas coords)
  let netOn      = false;
  let connTick   = 0;

  function manageConns(nodePos) {
    connTick++;
    if (connTick % 78 === 0 && netOn && conns.length < 15) {
      const toLogo = Math.random() < 0.40 && anchors.length > 0;
      if (toLogo) {
        conns.push({
          kind:'hl',
          hi  : Math.floor(Math.random() * HUB_N),
          ai  : Math.floor(Math.random() * anchors.length),
          life:0, max: 210 + Math.random() * 230,
          pp  : Math.random(), ps: 0.008 + Math.random() * 0.009,
        });
      } else {
        const a = Math.floor(Math.random() * HUB_N);
        let   b = Math.floor(Math.random() * HUB_N);
        while (b === a) b = Math.floor(Math.random() * HUB_N);
        conns.push({
          kind:'hh', a, b,
          life:0, max: 165 + Math.random() * 200,
          pp  : Math.random(), ps: 0.007 + Math.random() * 0.010,
        });
      }
    }
    conns = conns.filter(c => c.life < c.max);
    conns.forEach(c => c.life++);
  }

  function drawConns(nodePos) {
    if (!netOn || !anchors.length) return;
    ctx.setLineDash([]);
    conns.forEach(c => {
      const p    = c.life / c.max;
      const fade = p < 0.15 ? p/0.15 : p > 0.80 ? (1-p)/0.20 : 1;
      const from = nodePos[c.kind==='hl' ? c.hi : c.a];
      const to   = c.kind==='hl' ? anchors[c.ai] : nodePos[c.b];
      if (!from || !to) return;

      /* Line */
      ctx.beginPath(); ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y);
      ctx.strokeStyle = `rgba(${G},${(0.24*fade).toFixed(3)})`;
      ctx.lineWidth   = 0.9; ctx.stroke();

      /* Pulse dot travelling along line */
      c.pp += c.ps;
      if (c.pp > 1.12) c.pp = -0.12;
      const pp = Math.max(0, Math.min(1, c.pp));
      const px = from.x + (to.x - from.x) * pp;
      const py = from.y + (to.y - from.y) * pp;
      const pa = 0.82 * fade;
      ctx.beginPath(); ctx.arc(px, py, 2.1, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${G},${pa.toFixed(3)})`; ctx.fill();
      /* Pulse micro-glow */
      const pg = ctx.createRadialGradient(px, py, 0, px, py, 7);
      pg.addColorStop(0, `rgba(${G},${(pa*0.45).toFixed(3)})`); pg.addColorStop(1,`rgba(${G},0)`);
      ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(px, py, 7, 0, Math.PI*2); ctx.fill();
    });
  }

  let t0 = null;
  function tick(ts) {
    if (!t0) t0 = ts;
    const t = (ts - t0) / 1000;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#050c08'; ctx.fillRect(0, 0, W, H);

    const cx = W/2, cy = H/2, base = Math.max(W,H) * 0.65;

    /* Central radial glow */
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, base * 0.9);
    grd.addColorStop(0,    `rgba(${G},.13)`);
    grd.addColorStop(0.40, `rgba(${G},.05)`);
    grd.addColorStop(1,    `rgba(${G},0)`);
    ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);

    /* Concentric dashed rotating rings */
    for (const r of RING_DEFS) {
      const rx = r.f*base, ry = rx*r.ar, ang = t*r.spd + r.ph;
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(ang); ctx.scale(1, ry/rx);
      ctx.beginPath(); ctx.arc(0, 0, rx, 0, Math.PI*2);
      ctx.setLineDash([r.dash, r.gap]); ctx.strokeStyle=`rgba(${G},${r.a})`; ctx.lineWidth=1.6; ctx.stroke();
      ctx.restore();
    }

    /* Hub node positions (elliptical orbit around logo centre) */
    const nodePos = hubs.map(h => {
      h.angle += h.speed * 0.016;
      return { x: ocx + Math.cos(h.angle)*h.radius, y: ocy + Math.sin(h.angle)*h.radius*0.52 };
    });

    /* Particle physics — identical to Login.tsx */
    ctx.setLineDash([]);
    for (const p of dots) {
      p.vx += (p.bvx - p.vx) * EASE; p.vy += (p.bvy - p.vy) * EASE;
      if (mouse.active) {
        const dx = p.x-mouse.x, dy = p.y-mouse.y, d = Math.sqrt(dx*dx+dy*dy);
        if (d < REPEL_R && d > 0.5) { const f=(1-d/REPEL_R)*REPEL_F; p.vx+=(dx/d)*f; p.vy+=(dy/d)*f; }
      }
      const spd = Math.sqrt(p.vx*p.vx+p.vy*p.vy);
      if (spd > 6) { p.vx=(p.vx/spd)*6; p.vy=(p.vy/spd)*6; }
      p.x += p.vx; p.y += p.vy;
      if(p.x<0)p.x=W; else if(p.x>W)p.x=0; if(p.y<0)p.y=H; else if(p.y>H)p.y=0;
    }

    /* Particle network links */
    for (let i=0; i<dots.length; i++) {
      for (let j=i+1; j<dots.length; j++) {
        const dx=dots[i].x-dots[j].x, dy=dots[i].y-dots[j].y, d=Math.sqrt(dx*dx+dy*dy);
        if (d < MAX_LINK) {
          ctx.beginPath(); ctx.moveTo(dots[i].x,dots[i].y); ctx.lineTo(dots[j].x,dots[j].y);
          ctx.strokeStyle=`rgba(${G},${((1-d/MAX_LINK)*0.16).toFixed(3)})`;
          ctx.lineWidth=0.7; ctx.stroke();
        }
      }
    }

    /* Cursor: links + pulsing aura + dot */
    if (mouse.active) {
      for (const p of dots) {
        const dx=p.x-mouse.x, dy=p.y-mouse.y, d=Math.sqrt(dx*dx+dy*dy);
        if (d<CURSOR_LINK) {
          ctx.beginPath(); ctx.moveTo(mouse.x,mouse.y); ctx.lineTo(p.x,p.y);
          ctx.strokeStyle=`rgba(${G},${((1-d/CURSOR_LINK)*0.55).toFixed(3)})`; ctx.lineWidth=1.1; ctx.stroke();
        }
      }
      const pr = REPEL_R*(0.82+Math.sin(t*3.5)*0.08);
      const cg = ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,pr);
      cg.addColorStop(0,`rgba(${G},0.18)`); cg.addColorStop(0.5,`rgba(${G},0.06)`); cg.addColorStop(1,`rgba(${G},0)`);
      ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(mouse.x,mouse.y,pr,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(mouse.x,mouse.y,3.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(${G},0.9)`; ctx.fill();
    }

    /* Regular particles */
    for (const p of dots) {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${G},.40)`; ctx.fill();
    }

    /* Neural-net connections (drawn before hub nodes so nodes appear on top) */
    manageConns(nodePos); drawConns(nodePos);

    /* Hub nodes: pulsing glow + bright core */
    nodePos.forEach((pos, i) => {
      const h  = hubs[i];
      const pa = 0.70 + Math.sin(t*1.9 + h.phase) * 0.30;

      const ng = ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,h.r*5.8);
      ng.addColorStop(0, `rgba(${G},${(0.30*pa).toFixed(3)})`); ng.addColorStop(1,`rgba(${G},0)`);
      ctx.fillStyle=ng; ctx.beginPath(); ctx.arc(pos.x,pos.y,h.r*5.8,0,Math.PI*2); ctx.fill();

      ctx.beginPath(); ctx.arc(pos.x,pos.y,h.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${G},${(0.90*pa).toFixed(3)})`; ctx.fill();
    });

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  return {
    setOrbitCenter(x, y) { ocx = x; ocy = y; },
    setAnchors(arr) { anchors = arr; },
    setNetOn(v)     { netOn = v; },
  };
})();


/* ═══════════════════════════════════════════════════════════════
   MATRIX FLICKER ENGINE
   State machine per character:  hidden → flicker → resolving → locked
═══════════════════════════════════════════════════════════════ */
const Flicker = (() => {
  const WORD   = 'sosun';
  const GLYPHS = 'ABCDEFGHJKLMNPRSTUVWXYZabcdefghjklmnpqrstuvwxyz023456789!#@[]<>/\\';
  let spans=[], states=[], lockSched=[], running=false, raf=null, t0=null;

  function rg() { return GLYPHS[Math.floor(Math.random()*GLYPHS.length)]; }

  /* Build one span per character — no whitespace nodes between them */
  function build() {
    const wrap = document.getElementById('logoTextWrap');
    wrap.innerHTML = '';
    spans=[]; states=[];
    for (const ch of WORD) {
      const s = document.createElement('span');
      s.className = 'char'; s.textContent = ch;
      wrap.appendChild(s); spans.push(s); states.push('hidden');
    }
  }

  /* Lock each span's width to the true character width.
     This prevents layout jitter when glitch characters swap in.  */
  function fixWidths() {
    spans.forEach(s => {
      const w = s.getBoundingClientRect().width;
      if (w > 0) s.style.width = (Math.ceil(w) + 1) + 'px';
    });
  }

  /* Apply one frame of animation to character i */
  function applyChar(i) {
    const s = spans[i], st = states[i];
    if (st === 'hidden' || st === 'locked') return;

    const r         = Math.random();
    const inFlicker = st === 'flicker';
    const showTrue  = inFlicker ? r < 0.22 : r < 0.75;
    const ch        = showTrue ? WORD[i] : rg();
    const alpha     = inFlicker ? (0.18 + Math.random()*0.46) : (0.62 + Math.random()*0.33);
    const glowR     = inFlicker ? (7  + Math.random()*16)     : 18;
    const glowA     = (alpha * (inFlicker ? 0.72 : 0.90)).toFixed(2);

    s.textContent       = ch;
    s.style.color       = `rgba(34,197,94,${alpha.toFixed(2)})`;
    s.style.textShadow  = inFlicker
      ? `0 0 ${glowR.toFixed(0)}px rgba(34,197,94,${glowA})`
      : `0 0 18px rgba(34,197,94,${glowA}), 0 0 38px rgba(34,197,94,0.32)`;

    if (inFlicker) {
      /* Occasional sub-pixel micro-jitter for the "glitch" feel */
      const dx = Math.random() < 0.045 ? (Math.random()-0.5)*3.5 : 0;
      const dy = Math.random() < 0.030 ? (Math.random()-0.5)*1.5 : 0;
      s.style.transform = (dx || dy) ? `translate(${dx.toFixed(1)}px,${dy.toFixed(1)}px)` : '';
    } else {
      s.style.transform = '';
    }
  }

  /* Lock a character to its final CSS class */
  function lockChar(i) {
    states[i] = 'locked';
    const s = spans[i];
    s.className = 'char locked';
    s.textContent = WORD[i];
    s.style.color = ''; s.style.textShadow = ''; s.style.transform = '';
    /* Brief over-brightness flash on lock-in */
    s.style.filter = 'brightness(2.5)';
    setTimeout(() => { s.style.filter = ''; }, 130);
  }

  /* Ongoing micro-flicker after all chars are locked */
  function microFlicker() {
    if (Math.random() < 0.012 && states.every(st => st === 'locked')) {
      const i = Math.floor(Math.random() * WORD.length);
      const s = spans[i];
      s.textContent = rg(); s.style.filter = 'brightness(1.85)';
      setTimeout(() => { s.textContent = WORD[i]; s.style.filter = ''; }, 42 + Math.random()*72);
    }
  }

  function loop(ts) {
    if (!running) return;
    if (!t0) t0 = ts;
    const elapsed = ts - t0;

    /* Process lock schedule */
    for (const item of lockSched) {
      if (!item.done && elapsed >= item.at) {
        if (states[item.i] === 'flicker') {
          states[item.i] = 'resolving';
          const idx = item.i;
          /* Brief resolving window then hard-lock */
          setTimeout(() => { if (states[idx] === 'resolving') lockChar(idx); }, 145 + Math.random()*95);
        }
        item.done = true;
      }
    }

    for (let i = 0; i < WORD.length; i++) applyChar(i);
    microFlicker();

    raf = requestAnimationFrame(loop);
  }

  return {
    init()   { build(); },
    measure(){ fixWidths(); },

    reset() {
      running = false;
      if (raf) { cancelAnimationFrame(raf); raf = null; }
      t0 = null; lockSched = [];
      build();
      /* Re-measure in next frame after layout */
      requestAnimationFrame(() => requestAnimationFrame(fixWidths));
      document.getElementById('logoWrapper').style.opacity = '0';
    },

    start() {
      running = true; t0 = null;

      /* Pre-seed with glitch chars so the first visible frame is already live */
      for (let i = 0; i < WORD.length; i++) {
        states[i]           = 'flicker';
        spans[i].textContent = rg();
        spans[i].style.color = 'rgba(34,197,94,0.28)';
      }

      /* Lock schedule: left-to-right with subtle jitter */
      lockSched = WORD.split('').map((_, i) => ({
        i, done: false,
        at: 1700 + i * 225 + (Math.random()-0.5) * 90,
      }));

      document.getElementById('logoWrapper').style.opacity = '1';
      raf = requestAnimationFrame(loop);
    },

    get allLocked() { return states.every(s => s === 'locked'); },
  };
})();


/* ═══════════════════════════════════════════════════════════════
   SCAN-LINE SWEEPER
   Thin luminous bar traverses the wordmark `passes` times.
═══════════════════════════════════════════════════════════════ */
function scanSweep(passes, totalMs) {
  const sl   = document.getElementById('scanLine');
  const wrap = document.getElementById('logoTextWrap');
  const w    = wrap.offsetWidth;
  const pMs  = Math.floor(totalMs / passes);
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  (async () => {
    for (let i = 0; i < passes; i++) {
      /* Hard-reset position without transition */
      sl.style.transition = 'none';
      sl.style.left       = '-6px';
      sl.style.opacity    = '0';
      /* Double-rAF: ensures transition is cleared before re-applying */
      await new Promise(r => requestAnimationFrame(r));
      await new Promise(r => requestAnimationFrame(r));
      /* Sweep */
      sl.style.transition = `left ${pMs - 50}ms linear, opacity 100ms ease`;
      sl.style.left       = (w + 6) + 'px';
      sl.style.opacity    = '1';
      await sleep(pMs + 10);
    }
    sl.style.opacity = '0';
  })();
}


/* ═══════════════════════════════════════════════════════════════
   MAIN REVEAL SEQUENCE
═══════════════════════════════════════════════════════════════ */
(function () {
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function resetAll() {
    Flicker.reset();
    ['subtitle','tagline'].forEach(id => {
      const el = document.getElementById(id);
      el.style.transition = 'none';
      el.style.opacity    = '0';
      el.style.transform  = 'translateY(10px)';
    });
    document.getElementById('replayBtn').style.opacity = '0';
    bgCanvas.setNetOn(false); bgCanvas.setAnchors([]);
  }

  window.startReveal = async function () {
    resetAll();
    await sleep(60);

    /* ── Phase 1: rings spin, hub nodes orbit (~0.9 s) ── */
    await sleep(900);

    /* ── Phase 2: Matrix flicker begins + scan-line sweeps ── */
    Flicker.start();
    scanSweep(3, 2900); // 3 passes, non-blocking

    /* ── Phase 3: wait for all characters to lock in
          last lock ≈ 1700 + 4×225 + jitter + 240 resolve = ~3.05 s ── */
    await sleep(3200);

    /* ── Phase 4: calibrate neural net to logo position ── */
    const lt    = document.getElementById('logoTextWrap');
    const lRect = lt.getBoundingClientRect();
    const lx    = lRect.left, ly = lRect.top, lw = lRect.width, lh = lRect.height;

    bgCanvas.setOrbitCenter(lx + lw/2, ly + lh/2);
    bgCanvas.setAnchors([
      { x: lx + lw*0.04, y: ly + lh*0.52 },
      { x: lx + lw*0.19, y: ly + lh*0.16 },
      { x: lx + lw*0.37, y: ly + lh*0.86 },
      { x: lx + lw*0.53, y: ly + lh*0.18 },
      { x: lx + lw*0.72, y: ly + lh*0.84 },
      { x: lx + lw*0.96, y: ly + lh*0.50 },
    ]);
    bgCanvas.setNetOn(true);

    /* ── Phase 5: Fihaara ── */
    await sleep(360);
    const sub = document.getElementById('subtitle');
    sub.style.transition = 'opacity 0.95s ease, transform 0.95s ease';
    sub.style.opacity    = '1';
    sub.style.transform  = 'translateY(0)';

    /* ── Phase 6: Tagline ── */
    await sleep(720);
    const tg = document.getElementById('tagline');
    tg.style.transition = 'opacity 0.95s ease, transform 0.95s ease';
    tg.style.opacity    = '1';
    tg.style.transform  = 'translateY(0)';

    /* ── Phase 7: Replay hint ── */
    await sleep(1500);
    document.getElementById('replayBtn').style.opacity = '1';
  };

  /* Boot: fonts → build spans → lock widths → reveal */
  document.fonts.ready.then(() => {
    Flicker.init();
    requestAnimationFrame(() => {
      Flicker.measure(); // measure true-char widths before first flicker frame
      startReveal();
    });
  });
})();
</script>
