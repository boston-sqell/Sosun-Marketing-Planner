<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Sosun Fihaara marketing operations platform: campaigns, tasks, calendar, and a Google Drive media library." />

    <!-- Google Fonts Preconnect & Stylesheet -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#863bff" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sosun Marketing Planner" />

    <title>Sosun Fihaara — Marketing Operations Platform</title>

    <!-- Redirect legacy .web.app URL to custom domain -->
    <script>
      if (window.location.hostname === 'sosun-marketing-planner-2026.web.app') {
        window.location.replace(
          'https://sosunmarketingplanner.online' +
          window.location.pathname +
          window.location.search +
          window.location.hash
        );
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
